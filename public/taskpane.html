<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini AI Assistant</title>
  <!-- Office.js -->
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <!-- CSS -->
  <link rel="stylesheet" href="taskpane.css">
</head>

<body>
  <!-- Header -->
  <header>
    <div class="logo-section">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L14.85 9.15L22 12L14.85 14.85L12 22L9.15 14.85L2 12L9.15 9.15L12 2Z" fill="url(#gemini_grad)"
          stroke="none" />
        <defs>
          <linearGradient id="gemini_grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#4285f4" />
            <stop offset="0.5" stop-color="#9b72cb" />
            <stop offset="1" stop-color="#d96570" />
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">Gemini AI</span>
    </div>
    <div class="header-actions">
      <button id="clear-chat-btn" class="header-btn" title="대화 초기화">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M15 4V3H9v1H4v2h1v13c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V6h1V4h-5zm2 15H7V6h10v13zM9 8h2v9H9V8zm4 0h2v9h2v-9z" />
        </svg>
      </button>
      <button id="settings-btn" class="header-btn" title="설정">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Template Selector -->
  <div class="template-selector"
    style="padding: 10px 20px; background: #fff; border-bottom: 1px solid var(--md-sys-color-surface-variant); display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;">
    <span
      style="font-size: 11px; font-weight: 700; color: var(--md-sys-color-outline); align-self: center; white-space: nowrap; margin-right: 4px;">STYLE:</span>
    <button class="template-chip active" data-template="normal">일반 대화</button>
    <button class="template-chip" data-template="report">보고서</button>
    <button class="template-chip" data-template="memo">공문서</button>
    <button class="template-chip" data-template="plan">기획서</button>
    <button class="template-chip" data-template="meeting">회의록</button>
  </div>

  <!-- Chat Messages -->
  <main id="chat-container">
    <div class="message assistant">
      <div class="bubble">안녕하세요! 워드 작성을 도와드리는 Gemini AI입니다. 아래 버튼을 이용해 음성 파일을 요약하거나, 궁금한 점을 물어보세요.</div>
    </div>
  </main>

  <!-- Action Chips -->
  <div class="action-chips">
    <button id="summarize-book-btn" class="chip primary">
      <span>📖 단행본 정리</span>
    </button>
    <button id="upload-doc-btn" class="chip">
      <span>📄 문서 업로드 (PDF/Docx)</span>
    </button>
    <button id="upload-audio-btn" class="chip">
      <span>🎙️ 음성 회의록</span>
    </button>
    <button id="fetch-selection-btn" class="chip">
      <span>📄 선택 텍스트</span>
    </button>
  </div>

  <!-- Input Area -->
  <div class="input-section">
    <div class="input-container">
      <textarea id="user-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      <button id="send-btn" class="send-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Hidden Inputs -->
  <input type="file" id="audio-file-input" style="display: none;" accept="audio/*">
  <input type="file" id="doc-file-input" style="display: none;" accept=".pdf,.doc,.docx,.txt">

  <!-- Settings Modal -->
  <div id="settings-overlay" class="overlay">
    <div class="modal">
      <h3 style="margin-top: 0;">⚙️ 설정</h3>

      <!-- API Key -->
      <div style="margin-bottom: 16px;">
        <label class="setting-label">Gemini API Key</label>
        <input type="password" id="api-key-input" class="setting-input" placeholder="AI Studio 키 입력">
      </div>

      <!-- Model Selection -->
      <div style="margin-bottom: 16px;">
        <label class="setting-label">AI 모델 선택</label>
        <select id="model-select" class="setting-input">
          <option value="gemini-2.5-flash">Gemini 2.5 Flash (고성능)</option>
          <option value="gemini-2.5-lite">Gemini 2.5 Lite (고효율)</option>
        </select>
      </div>

      <!-- Language Selection -->
      <div style="margin-bottom: 16px;">
        <label class="setting-label">응답 언어 설정</label>
        <select id="lang-select" class="setting-input">
          <option value="ko">한국어 (Default)</option>
          <option value="en">English (영어)</option>
        </select>
      </div>

      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px;">
        <input type="checkbox" id="track-changes-toggle">
        <label for="track-changes-toggle" style="font-size: 14px;">수정 추적(Track Changes) 활성화</label>
      </div>

      <div style="display: flex; justify-content: flex-end; gap: 10px;">
        <button id="cancel-settings-btn" class="chip" style="border: none;">취소</button>
        <button id="save-settings-btn" class="chip primary">저장</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="overlay">
    <div style="text-align: center; color: white;">
      <div class="spinner"
        style="border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px;">
      </div>
      <p id="loading-text">처리 중입니다...</p>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <style>
    .setting-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--md-sys-color-outline);
    }

    .setting-input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--md-sys-color-outline);
      font-family: inherit;
      margin-bottom: 4px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>

  <!-- JavaScript -->
  <script src="taskpane.js"></script>
</body>

</html>
