<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini AI Assistant</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css">
</head>

<body>
  <!-- Header -->
  <header>
    <div class="logo-section">
      <div class="gemini-icon">✦</div>
      <span class="logo-text">Gemini AI</span>
      <select id="style-select" class="style-dropdown">
        <option value="normal">일반 대화</option>
        <option value="report">📄 보고서</option>
        <option value="memo">🏛️ 공문서</option>
        <option value="plan">📅 기획서</option>
        <option value="meeting">🎙️ 회의록</option>
      </select>
    </div>
    <div class="header-actions">
      <button id="clear-chat-btn" class="icon-btn" title="대화 초기화">🗑️</button>
      <button id="settings-btn" class="icon-btn" title="설정">⚙️</button>
    </div>
  </header>

  <!-- Chat Container -->
  <main id="chat-container">
    <div class="message assistant">
      <div class="bubble">안녕하세요! 워드 작성을 도와드리는 Gemini AI입니다. 무엇을 도와드릴까요?</div>
    </div>
  </main>

  <!-- Quick Actions Bar (Floating) -->
  <div class="quick-tools">
    <button class="quick-btn" data-action="polish">✨ 교정</button>
    <button class="quick-btn" data-action="shorten">📝 요약</button>
    <button class="quick-btn" data-action="formal">🏛️ 격식</button>
    <button class="quick-btn" data-action="scan">🎯 학습</button>
  </div>

  <!-- Bottom Input Area -->
  <div class="bottom-area">
    <div class="input-wrapper">
      <button id="attach-btn" class="plus-btn" title="추가 기능">+</button>
      <div class="textarea-container">
        <textarea id="user-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      </div>
      <button id="send-btn" class="send-btn">➔</button>
    </div>

    <!-- Hidden Attach Menu -->
    <div id="attach-menu" class="attach-menu">
      <button id="summarize-book-btn" class="menu-item">📖 단행본 정리</button>
      <button id="upload-doc-btn" class="menu-item">📄 파일 업로드 (PDF/Txt)</button>
      <button id="upload-audio-btn" class="menu-item">🎙️ 음성 회의록</button>
      <button id="fetch-selection-btn" class="menu-item">📄 선택 영역 가져오기</button>
      <div class="menu-divider"></div>
      <div class="menu-footer">
        <span>본문 자동 반영</span>
        <label class="switch">
          <input type="checkbox" id="auto-apply-toggle">
          <span class="slider round"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Hidden Inputs -->
  <input type="file" id="audio-file-input" style="display: none;" accept="audio/*">
  <input type="file" id="doc-file-input" style="display: none;" accept=".pdf,.txt">

  <!-- Overlays -->
  <div id="settings-overlay" class="overlay">
    <div class="modal">
      <h3>⚙️ 설정</h3>
      <div class="field">
        <label>Gemini API Key</label>
        <input type="password" id="api-key-input">
      </div>
      <div class="field">
        <label>AI 모델</label>
        <select id="model-select">
          <option value="gemini-2.5-flash">Gemini 2.5 Flash (권장)</option>
          <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        </select>
      </div>
      <div class="field">
        <label>언어</label>
        <select id="lang-select">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="track-changes-toggle">
        <label for="track-changes-toggle">수정 추적 활성화</label>
      </div>
      <div class="modal-btns">
        <button id="cancel-settings-btn" class="txt-btn">취소</button>
        <button id="save-settings-btn" class="pri-btn">저장</button>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="overlay">
    <div class="loader-content">
      <div class="spinner"></div>
      <p id="loading-text">처리 중...</p>
    </div>
  </div>

  <div id="toast"></div>

  <script src="taskpane.js"></script>
</body>

</html>
